name: Feature Request
description: Propose a new feature, operator, or capability.
title: "[FEAT]: "
labels: ["feature request"]
assignees: []
body:
  - type: markdown
    attributes:
      value: >
        #### Before submitting an issue, please make sure the issue hasn't been already open or addressed by searching through [existing issues](https://github.com/MinghuasLab/flash-attention-npu/issues).
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Request
      description: Describe your feature request. Give a clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why do we need this feature?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds already exist, and why are they insufficient?
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context that is relevant.
    validations:
      required: false
